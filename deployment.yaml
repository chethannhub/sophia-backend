apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-teller-app
  labels:
    app: news-teller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-teller
  template:
    metadata:
      labels:
        app: news-teller
    spec:
      containers:
      - name: news-teller
        image: gcr.io/__PROJECT_ID__/news-teller:latest
        ports:
        - containerPort: 8080
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/app/credentials/service-account.json"
        - name: GCP_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GCP_PROJECT_ID
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GOOGLE_API_KEY
        - name: GOOGLE_CSE_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GOOGLE_CSE_ID
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: NEWS_API_KEY
        volumeMounts:
        - name: google-cloud-key
          mountPath: /app/credentials
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: google-cloud-key
        secret:
          secretName: google-cloud-key
